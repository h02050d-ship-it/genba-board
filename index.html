<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場作業ボード</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏭</text></svg>">
<style>
  :root { --bg:#f0f2f5; --text:#222; --sub:#888; --accent:#2e7d32; --accent2:#1a73e8; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',Meiryo,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .header { background:var(--accent); color:#fff; padding:10px 16px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .header h1 { font-size:20px; font-weight:800; }
  .header .date-nav { display:flex; align-items:center; gap:6px; }
  .header input[type=date] { border:none; border-radius:6px; padding:4px 8px; font-size:15px; font-weight:700; }
  .header .spacer { flex:1; }
  .header .status { font-size:12px; opacity:.85; }
  .tabs { display:flex; background:#fff; border-bottom:2px solid #ddd; overflow-x:auto; }
  .tab { padding:10px 18px; font-size:15px; font-weight:700; color:#666; cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); background:#f1f8e9; }
  .page { display:none; padding:14px; max-width:1400px; margin:0 auto; }
  .page.active { display:block; }
  .cards { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .card { background:#fff; border-radius:10px; padding:10px 16px; box-shadow:0 1px 4px rgba(0,0,0,.08); min-width:130px; }
  .card .c-label { font-size:12px; color:var(--sub); font-weight:600; }
  .card .c-val { font-size:24px; font-weight:800; }
  .card .c-note { font-size:11px; color:var(--sub); }
  .card.hl { background:#e8f5e9; }
  .card.warn { background:#fff3e0; }
  .sec { background:#fff; border-radius:10px; padding:14px; box-shadow:0 1px 4px rgba(0,0,0,.08); margin-bottom:14px; }
  .sec h2 { font-size:16px; font-weight:800; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .sec h2::before { content:''; width:4px; height:16px; background:var(--accent); border-radius:2px; }
  .sec .hint { font-size:12px; color:var(--sub); margin:-6px 0 10px; }
  table { width:100%; border-collapse:collapse; }
  th { background:#eceff1; padding:6px 8px; font-size:13px; text-align:center; border:1px solid #ddd; white-space:nowrap; }
  td { padding:5px 8px; font-size:14px; border:1px solid #e0e0e0; text-align:center; vertical-align:middle; }
  td.l { text-align:left; }
  tr:nth-child(even) td { background:#fafafa; }
  td[contenteditable=true] { cursor:text; min-width:40px; }
  td[contenteditable=true]:focus { background:#e3f2fd !important; outline:2px solid var(--accent2); }
  select, input[type=number], input[type=text] { padding:4px 6px; font-size:14px; border:1px solid #ccc; border-radius:6px; font-weight:600; }
  input[type=checkbox] { width:20px; height:20px; accent-color:var(--accent); cursor:pointer; }
  .btn { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:8px 18px; font-size:15px; font-weight:700; cursor:pointer; }
  .btn:hover { opacity:.9; }
  .btn.blue { background:var(--accent2); }
  .btn.gray { background:#9e9e9e; }
  .btn.sm { padding:4px 10px; font-size:13px; }
  .btn-del { background:none; border:1px solid #ccc; color:#999; border-radius:4px; padding:2px 8px; font-size:12px; cursor:pointer; }
  .btn-del:hover { background:#ffebee; color:#d32f2f; border-color:#d32f2f; }
  .att-list { display:flex; gap:8px; flex-wrap:wrap; }
  .att-chip { display:flex; align-items:center; gap:6px; background:#f5f5f5; border:2px solid #ddd; border-radius:20px; padding:6px 14px; font-size:15px; font-weight:700; cursor:pointer; user-select:none; }
  .att-chip.on { background:#e8f5e9; border-color:var(--accent); color:var(--accent); }
  .att-chip.off { opacity:.5; }
  .tag { display:inline-block; padding:1px 8px; border-radius:10px; font-size:11px; font-weight:700; color:#fff; }
  .tag-order { background:#c62828; } .tag-semi { background:#e65100; } .tag-buffer { background:#2e7d32; } .tag-maint { background:#6a1b9a; } .tag-office { background:#546e7a; }
  .member-name { font-weight:800; font-size:15px; }
  .qty-big { font-weight:800; font-size:16px; }
  .bar-wrap { background:#eee; border-radius:8px; height:22px; position:relative; overflow:hidden; margin:4px 0; }
  .bar { height:100%; background:linear-gradient(90deg,#66bb6a,#2e7d32); border-radius:8px; }
  .bar.over { background:linear-gradient(90deg,#ffa726,#e65100); }
  .bar-label { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#333; }
  .short { background:#ffcdd2 !important; }
  .loading { display:flex; align-items:center; justify-content:center; padding:60px; color:var(--sub); gap:10px; }
  .spinner { width:24px; height:24px; border:3px solid #ddd; border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 24px; border-radius:24px; font-size:14px; font-weight:700; opacity:0; transition:opacity .3s; pointer-events:none; z-index:999; }
  .toast.show { opacity:1; }
  .skills-scroll { overflow-x:auto; }
  .skills-scroll th.rot { height:110px; white-space:nowrap; vertical-align:bottom; padding:4px 2px; }
  .skills-scroll th.rot > div { writing-mode:vertical-rl; text-orientation:mixed; margin:0 auto; font-size:12px; }
  .skills-scroll td:first-child, .skills-scroll th:first-child { position:sticky; left:0; background:#fff; z-index:1; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; align-items:center; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:#fff; border-radius:12px; max-width:520px; width:92%; max-height:85vh; overflow:auto; box-shadow:0 8px 32px rgba(0,0,0,.25); }
  .modal-head { padding:12px 18px; background:var(--accent); color:#fff; border-radius:12px 12px 0 0; font-size:16px; font-weight:800; display:flex; justify-content:space-between; align-items:center; }
  .modal-close { background:none; border:none; color:#fff; font-size:24px; cursor:pointer; }
  .modal-body { padding:16px 18px; }
  .modal-body .frow { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .modal-body .frow label { width:110px; font-size:14px; font-weight:700; flex-shrink:0; }
  .modal-body .who { display:flex; gap:6px; flex-wrap:wrap; }
  .modal-body .who label { display:flex; align-items:center; gap:4px; width:auto; font-weight:600; background:#f5f5f5; border-radius:14px; padding:4px 10px; cursor:pointer; }
  @media print { .header, .tabs, .btn, .att-list { display:none !important; } .page { display:none; } .page.active { display:block; } }
</style>
</head>
<body>
<div class="header">
  <h1>🏭 現場作業ボード</h1>
  <div class="date-nav">
    <button class="btn sm gray" onclick="shiftDate(-1)">◀</button>
    <input type="date" id="planDate" onchange="onDateChange()">
    <button class="btn sm gray" onclick="shiftDate(1)">▶</button>
  </div>
  <div class="spacer"></div>
  <span class="status" id="connStatus">接続中...</span>
</div>
<div class="tabs">
  <div class="tab active" data-page="today" onclick="showPage('today')">📋 今日の割振り</div>
  <div class="tab" data-page="products" onclick="showPage('products')">📦 商品・年間計画</div>
  <div class="tab" data-page="norma" onclick="showPage('norma')">🎯 ノルマ・進捗</div>
  <div class="tab" data-page="tasks" onclick="showPage('tasks')">🛠 作業マスタ</div>
  <div class="tab" data-page="members" onclick="showPage('members')">👥 メンバー</div>
  <div class="tab" data-page="future" onclick="showPage('future')">📈 将来シミュレーション</div>
</div>

<div class="page active" id="page-today"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>
<div class="page" id="page-products"></div>
<div class="page" id="page-norma"></div>
<div class="page" id="page-tasks"></div>
<div class="page" id="page-members"></div>
<div class="page" id="page-future"></div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="taskModal" onclick="if(event.target===this)closeTaskModal()">
  <div class="modal">
    <div class="modal-head">新しい作業を登録<button class="modal-close" onclick="closeTaskModal()">&times;</button></div>
    <div class="modal-body">
      <div class="frow"><label>作業名</label><input type="text" id="ntName" style="flex:1" placeholder="例: 端材の片付け"></div>
      <div class="frow"><label>単位</label><input type="text" id="ntUnit" style="width:80px" value="枚"> <span style="font-size:12px;color:#888">枚・束・本・回など（時間だけなら空欄）</span></div>
      <div class="frow"><label>1単位の時間(分)</label><input type="number" id="ntMin" style="width:80px" value="1" step="0.1"></div>
      <div class="frow"><label>優先度</label><select id="ntPri"><option value="1">★1 最優先</option><option value="2">★2 高</option><option value="3" selected>★3 中</option><option value="4">★4 低</option><option value="5">★5 空き時間</option></select></div>
      <div class="frow"><label>種類</label><select id="ntType"><option value="order">受注直結</option><option value="semi">前後工程</option><option value="buffer" selected>在庫作業</option><option value="maint">保守</option><option value="office">事務</option></select></div>
      <div class="frow" style="align-items:flex-start"><label>できる人</label><div class="who" id="ntWho"></div></div>
      <div style="text-align:right;margin-top:14px"><button class="btn" onclick="saveNewTask()">登録する</button></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
// ===== Firebase（加工予定表と同じプロジェクトに相乗り。genba/ 以下だけ使う） =====
const firebaseConfig = {
  apiKey: "AIzaSyBkpsxdYciMiLmsBfHNWRL7OFniSsssQwA",
  authDomain: "kakou-yotei.firebaseapp.com",
  databaseURL: "https://kakou-yotei-default-rtdb.firebaseio.com",
  projectId: "kakou-yotei",
  storageBucket: "kakou-yotei.firebasestorage.app",
  messagingSenderId: "633993422136",
  appId: "1:633993422136:web:a8c9f47c35fead59840dcd"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const TYPE_LABEL = { order:'受注直結', semi:'前後工程', buffer:'在庫作業', maint:'保守', office:'事務' };
const PRI_LABEL = { 1:'★1 最優先', 2:'★2 高', 3:'★3 中', 4:'★4 低', 5:'★5 空き時間' };
const QPRI = { 1:'🔥 急ぎ（納期）', 2:'⚡ 注文分', 3:'📦 ストック' };

// ===== 初期データ（初回だけ書き込み。以降は画面から編集） =====
const SEED_TASKS = {
  kessoku:      { seq:1,  name:'結束',                 unit:'束', min:4,   pri:1, type:'order',  maxW:2, source:'kakou_kessoku', note:'加工予定表の結束予定から自動計算' },
  molder:       { seq:2,  name:'モルダー',             unit:'分', min:1,   pri:1, type:'order',  maxW:1, source:'kakou_molder',  note:'加工予定表の予想加工時間から自動計算' },
  choshi_okuri: { seq:3,  name:'超仕上げ（送り）',     unit:'束', min:3,   pri:2, type:'semi',   maxW:1, source:'', note:'受けとペアで割振り' },
  choshi_uke:   { seq:4,  name:'超仕上げ（受け）',     unit:'束', min:3,   pri:2, type:'semi',   maxW:1, source:'', note:'送りとペアで割振り' },
  anaake:       { seq:5,  name:'穴空け',               unit:'枚', min:0.63, pri:5, type:'semi',  maxW:1, source:'', note:'父専任' },
  umeki:        { seq:6,  name:'埋木',                 unit:'枚', min:1.25, pri:5, type:'semi',  maxW:2, source:'', note:'必ず2人1組' },
  side:         { seq:7,  name:'サイド穴あけ・修正',   unit:'枚', min:2,   pri:3, type:'semi',   maxW:1, source:'', note:'モルダーでコマが出た材の修正' },
  pate:         { seq:8,  name:'パテ',                 unit:'枚', min:1,   pri:3, type:'semi',   maxW:2, source:'', note:'' },
  hamono_kenma: { seq:9,  name:'刃物研磨',             unit:'回', min:40,  pri:3, type:'maint',  maxW:1, source:'', note:'' },
  hamono_koukan:{ seq:10, name:'刃物交換・セット',     unit:'回', min:30,  pri:3, type:'maint',  maxW:1, source:'', note:'' },
  shiwake:      { seq:11, name:'仕分け（寄せた板）',   unit:'枚', min:0.3, pri:3, type:'buffer', maxW:2, source:'', note:'' },
  itayose:      { seq:12, name:'板寄せ（乾燥板）',     unit:'枚', min:0.4, pri:4, type:'buffer', maxW:3, source:'', note:'' },
  itahoshi:     { seq:13, name:'板干し（生板）',       unit:'枚', min:0.5, pri:4, type:'buffer', maxW:3, source:'', note:'' },
  edamuki:      { seq:14, name:'枝剥き・枝切り',       unit:'本', min:1.5, pri:4, type:'buffer', maxW:2, source:'', note:'' },
  edakiri:      { seq:15, name:'枝切（コマ用）',       unit:'本', min:1,   pri:4, type:'buffer', maxW:2, source:'', note:'' },
  edashiwake:   { seq:16, name:'枝仕分け',             unit:'本', min:0.5, pri:5, type:'buffer', maxW:2, source:'', note:'' },
  jimu:         { seq:17, name:'事務全般',             unit:'',   min:0,   pri:5, type:'office', maxW:2, source:'', note:'' },
  sonota:       { seq:18, name:'その他',               unit:'',   min:0,   pri:5, type:'office', maxW:9, source:'', note:'' },
  kaizen:       { seq:19, name:'AI・業務改善（開発）', unit:'',   min:0,   pri:5, type:'office', maxW:9, source:'', note:'将来への投資枠。固定枠はメンバー画面で設定' }
};
const ALL = Object.keys(SEED_TASKS);
const skillsOf = (...exclude) => { const s = {}; ALL.forEach(t => { if (!exclude.includes(t)) s[t] = 1; }); return s; };
const SEED_MEMBERS = {
  daiki:    { seq:1, name:'大樹',     age:'', retireAge:70, workStart:'08:00', workEnd:'16:00', eff:100, reserveMin:120, reserveTask:'kaizen', skills: skillsOf('anaake'), note:'経理以外全般（穴あけは父専任のため外し）' },
  junya:    { seq:2, name:'潤也',     age:'', retireAge:70, workStart:'08:00', workEnd:'16:00', eff:100, skills: skillsOf('anaake','hamono_kenma','hamono_koukan'), note:'研磨・刃物交換・経理以外' },
  kaede:    { seq:3, name:'楓',       age:'', retireAge:70, workStart:'09:00', workEnd:'15:00', eff:100, absentUntil:'2026-11-30', skills: skillsOf('anaake','hamono_kenma','hamono_koukan'), note:'モルダーのセット以外（運転は可）。11月まで育休' },
  chichi:   { seq:4, name:'父',       age:'', retireAge:75, workStart:'07:00', workEnd:'16:00', eff:100, skills:{ anaake:1, itahoshi:1, itayose:1, edamuki:1, edakiri:1, choshi_okuri:1, kessoku:1, sonota:1 }, note:'穴あけ専任' },
  haha:     { seq:5, name:'母',       age:'', retireAge:75, workStart:'08:00', workEnd:'16:00', eff:100, skills: skillsOf('anaake'), note:'穴あけ以外（研磨・刃物・超仕上げ受け・事務可）※要確認' },
  yamada:   { seq:6, name:'山田さん', age:65, retireAge:70, workStart:'08:00', workEnd:'15:00', eff:100, skills:{ umeki:1, pate:1, choshi_okuri:1, edamuki:1, edashiwake:1, kessoku:1, sonota:1 }, note:'パート。メイン=埋木・パテ・超仕上げ流し' },
  nakayama: { seq:7, name:'中山さん', age:72, retireAge:75, workStart:'08:00', workEnd:'15:00', eff:100, skills:{ umeki:1, pate:1, choshi_okuri:1, edamuki:1, edashiwake:1, kessoku:1, itayose:1, itahoshi:1, edakiri:1, sonota:1 }, note:'パート。山田さんの作業＋板寄せ・干す・枝切' }
};
// 商品マスタ（記号は加工予定表の品名と同じ。年間目標→作業ノルマへの落とし込みに使う）
const SEED_PRODUCTS = {
  F: { seq:1, code:'F', name:'桧フローリング(15mm)', yearTarget:0, taskMin:{ molder:4.4, kessoku:4 }, note:'' },
  P: { seq:2, code:'P', name:'桧羽目板(12mm)',       yearTarget:0, taskMin:{ molder:4.4, kessoku:4 }, note:'' },
  N: { seq:3, code:'N', name:'ナイスオリジナル',     yearTarget:0, taskMin:{ molder:4.4, kessoku:4 }, note:'' },
  S: { seq:4, code:'S', name:'桧スノコ板',           yearTarget:0, taskMin:{ molder:4.4, kessoku:4 }, note:'' }
};
// 全員共通の休憩（勤務時間内にかかる分だけ差し引く）
const BREAKS = [ { at: 10*60, min: 15 }, { at: 12*60, min: 45 }, { at: 15*60, min: 15 } ];
function workMinutes(m) {   // 休憩を引いた実働（分）
  const p = s => { const parts = String(s).split(':'); return (parseInt(parts[0])||0)*60 + (parseInt(parts[1])||0); };
  if (m.workStart && m.workEnd) {
    const st = p(m.workStart), en = p(m.workEnd);
    let mins = Math.max(0, en - st);
    BREAKS.forEach(b => { if (b.at >= st && b.at < en) mins -= b.min; });
    return Math.max(0, mins);
  }
  return (parseFloat(m.hours)||8) * 60;   // 勤務時間未設定の人は旧・稼働(h)で計算
}
function capMinutes(m) { return workMinutes(m) * ((parseFloat(m.eff)||100)/100); }
function isAbsent(m) { return !!(m.absentUntil && String(m.absentUntil) >= curDate()); }
function weekdayJp(dateStr) { return ['日','月','火','水','木','金','土'][new Date(dateStr + 'T00:00:00').getDay()]; }
function isOffToday(m) { return String(m.offDays||'').includes(weekdayJp(curDate())); }
// 作業の「優先担当」欄（名前かIDをカンマ区切り）をメンバーIDに解決
function ownerIds(t) {
  return String(t.owners||'').split(/[,、・\s]+/).filter(Boolean).map(tok => {
    const hit = Object.entries(members).find(([id, m]) => id === tok || (m.name||'') === tok);
    return hit ? hit[0] : null;
  }).filter(Boolean);
}

// ===== 状態 =====
let tasks = {}, members = {}, queue = {}, queueItems = {}, targets = {}, actuals = {}, products = {};
let kakouItems = [];
let plan = null;          // 表示中日付のプラン {att:{}, rows:[]}
let curPage = 'today';
let ready = { g:false, k:false };

function today() { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function curDate() { return document.getElementById('planDate').value || today(); }
function shiftDate(n) { const d = new Date(curDate()); d.setDate(d.getDate()+n); document.getElementById('planDate').value = d.toISOString().slice(0,10); onDateChange(); }
function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtMin = min => { const m = Math.round(min); if (m<=0) return '0分'; if (m<60) return m+'分'; const h=Math.floor(m/60), mm=m%60; return mm? h+'時間'+mm+'分' : h+'時間'; };
const sortedTasks = () => Object.entries(tasks).sort((a,b)=>(a[1].seq||99)-(b[1].seq||99));
const sortedMembers = () => Object.entries(members).sort((a,b)=>(a[1].seq||99)-(b[1].seq||99));

// ===== 起動 =====
firebase.auth().onAuthStateChanged(user => { if (user) init(); });
firebase.auth().signInAnonymously().catch(e => {
  document.getElementById('page-today').innerHTML = '<div class="loading">認証に失敗しました: ' + esc(e.message) + '</div>';
});

function init() {
  db.ref('genba').on('value', snap => {
    const g = snap.val();
    if (!g || !g.tasks) { seed(); return; }
    tasks = g.tasks || {}; members = g.members || {}; queue = g.queue || {}; queueItems = g.queueItems || {};
    targets = g.targets || {}; actuals = g.actuals || {}; products = g.products || {};
    const p = (g.plans||{})[curDate()];
    plan = p ? JSON.parse(JSON.stringify(p)) : plan;
    ready.g = true;
    document.getElementById('connStatus').textContent = '✓ 同期中';
    ensureUpgrades();
    renderAll();
  }, err => {
    document.getElementById('page-today').innerHTML = '<div class="loading">genba領域にアクセスできません: ' + esc(err.message) + '<br>Firebaseのルールで genba への読み書き許可が必要です。</div>';
  });
  db.ref('items').on('value', snap => {
    const data = snap.val() || {};
    kakouItems = Object.values(data);
    ready.k = true;
    renderAll();
  });
}
// 既存データに新機能のフィールドを後付け（欠けている分だけ書き込む）
let upgraded = false;
function ensureUpgrades() {
  if (upgraded) return;
  upgraded = true;
  const ups = {};
  if (!tasks.kaizen) ups['tasks/kaizen'] = SEED_TASKS.kaizen;
  if (members.daiki) {
    if (!(members.daiki.skills||{}).kaizen) ups['members/daiki/skills/kaizen'] = 1;
    if (members.daiki.reserveMin === undefined) { ups['members/daiki/reserveMin'] = 120; ups['members/daiki/reserveTask'] = 'kaizen'; }
  }
  // 勤務時間を既存メンバーに後付け
  const WK = { daiki:['08:00','16:00'], junya:['08:00','16:00'], haha:['08:00','16:00'], chichi:['07:00','16:00'], yamada:['08:00','15:00'], nakayama:['08:00','15:00'], kaede:['09:00','15:00'] };
  Object.entries(WK).forEach(([id, se]) => {
    if (members[id] && members[id].workStart === undefined) { ups['members/'+id+'/workStart'] = se[0]; ups['members/'+id+'/workEnd'] = se[1]; }
  });
  if (members.kaede && members.kaede.absentUntil === undefined) ups['members/kaede/absentUntil'] = '2026-11-30';
  // 商品マスタとバッファ率を後付け
  if (!Object.keys(products).length) ups['products'] = SEED_PRODUCTS;
  if (targets.bufferPct === undefined) ups['targets/bufferPct'] = 15;
  // 穴あけ・穴埋めにペース上限の初期値（仮。実態に合わせて作業マスタで修正）
  if (tasks.anaake && tasks.anaake.paceNorm === undefined) ups['tasks/anaake/paceNorm'] = 200;
  if (tasks.umeki && tasks.umeki.paceNorm === undefined) ups['tasks/umeki/paceNorm'] = 100;
  // 旧「作業待ちの量」→ 優先度付き待ちリストへ移行（ストック扱い）
  if (!Object.keys(queueItems).length && Object.keys(queue).length) {
    Object.entries(queue).forEach(([tid, q]) => {
      if (parseFloat(q) > 0 && tasks[tid]) ups['queueItems/qm_' + tid] = { t: tid, qty: parseFloat(q), pri: 3, note: '' };
    });
    ups['queue'] = null;
  }
  if (Object.keys(ups).length) db.ref('genba').update(ups);
}
function seed() {
  db.ref('genba/tasks').set(SEED_TASKS);
  db.ref('genba/members').set(SEED_MEMBERS);

}

// ===== 加工予定表からの需要計算（kakou-yoteiと同じ式） =====
function kakouDemand() {
  let molderMin = 0, kessokuBundles = 0, seizouCount = 0, kanryoCount = 0;
  kakouItems.forEach(it => {
    const ord = parseInt(it.order || '0');
    const done = !isNaN(ord) && ord >= 9;
    if (done) { kanryoCount++; return; }
    seizouCount++;
    if ((it.zaiko||'') !== '1') {
      const len = parseFloat(it.length)||0, qty = parseFloat(it.qty)||0, planned = parseFloat(it.planned)||0;
      if (len && qty && planned) {
        const actualNum = parseInt(it.actual);
        const bundles = !isNaN(actualNum) ? Math.max(0, planned-actualNum) : planned;
        if (bundles > 0) molderMin += 4 * (len/4000) * (qty/8) * bundles * 1.1;
      }
    }
    if (it.kessoku_jun) {
      const planned = parseFloat(it.planned)||0;
      const actualNum = parseInt(it.actual);
      kessokuBundles += !isNaN(actualNum) ? Math.max(planned - actualNum, actualNum ? 0 : planned) || planned : planned;
    }
  });
  return { molderMin: Math.round(molderMin), kessokuBundles: Math.round(kessokuBundles), seizouCount, kanryoCount };
}

// ===== 自動割振り =====
function autoAssign() {
  const d = kakouDemand();
  const att = sortedMembers().filter(([id]) => plan && plan.att && plan.att[id]);
  const cap = {};
  att.forEach(([id, m]) => cap[id] = capMinutes(m));
  const rows = [];
  const put = (mid, tid, min, note, qi) => {
    const t = tasks[tid];
    const qty = (t.min>0 && t.unit && t.unit!=='分' && t.unit!=='') ? Math.floor(min / t.min) : '';
    const row = { m: mid, t: tid, min: Math.round(min), qty: qty, note: note||'' };
    if (qi) row.qi = qi;
    rows.push(row);
    cap[mid] -= min;
  };
  // ① まず固定枠（メンバーごとの予約時間: AI・業務改善、事務など）を確保
  att.forEach(([mid, m]) => {
    const rm = parseFloat(m.reserveMin)||0;
    if (rm > 0 && cap[mid] > 0) {
      const tid = (m.reserveTask && tasks[m.reserveTask]) ? m.reserveTask : 'sonota';
      put(mid, tid, Math.min(rm, cap[mid]));
    }
  });
  // ①' 毎日の定常作業（モルダー刃物交換・研磨など、dailyMinを設定した作業を優先担当に）
  sortedTasks().forEach(([tid, t]) => {
    const dmin = parseFloat(t.dailyMin)||0;
    if (dmin <= 0) return;
    const ow = ownerIds(t);
    const cand = att.filter(([id, m]) => (ow.length ? ow.includes(id) : (m.skills && m.skills[tid])) && cap[id] > 0)
                    .sort((a,b) => cap[b[0]] - cap[a[0]]);
    if (cand.length) put(cand[0][0], tid, Math.min(dmin, cap[cand[0][0]]));
  });
  // ② 需要リスト：加工予定表（自動・注文分扱い）＋ 作業待ちリスト（優先度付き）
  const demands = [];
  sortedTasks().forEach(([id, t]) => {
    if (t.source === 'kakou_molder' && d.molderMin > 0) demands.push({ id, min: d.molderMin, ip: 2, note: '', qi: null });
    else if (t.source === 'kakou_kessoku' && d.kessokuBundles > 0) demands.push({ id, min: d.kessokuBundles * (t.min||4), ip: 2, note: '', qi: null });
    // パテ: モルダーと同時間×2人×丸節率(約85%) → モルダー残に連動して自動計算
    else if (t.source === 'kakou_pate' && d.molderMin > 0) demands.push({ id, min: Math.round(d.molderMin * 1.7), ip: 2, note: 'モルダー連動', qi: null });
  });
  Object.entries(queueItems).forEach(([qid, q]) => {
    const tk = tasks[q.t];
    if (!tk) return;
    const min = (parseFloat(q.qty)||0) * (tk.min||0);
    if (min <= 0) return;
    demands.push({ id: q.t, min, ip: parseInt(q.pri)||2, note: q.note||'', qi: qid });
  });
  // 並び順: 🔥急ぎ → ⚡注文分（作業の優先度順）。📦ストックは後回し
  const byPri = (a,b) => a.ip - b.ip || (tasks[a.id].pri||3) - (tasks[b.id].pri||3) || (tasks[a.id].seq||99) - (tasks[b.id].seq||99);
  const mainD  = demands.filter(x => x.ip <= 2).sort(byPri);
  const stockD = demands.filter(x => x.ip >= 3).sort(byPri);

  const workersCount = {};   // 同じ作業の同時人数（maxW）を需要をまたいで数える
  const usedTaskMin = {};    // 作業ごとの割振り済み分（ペース上限の管理用）
  const assign = dm => {
    let remain = dm.min;
    const tk = tasks[dm.id];
    const maxW = parseInt(tk.maxW)||1;
    // ペース上限（1日の量）→ 分に換算。食いすぎ防止で今日はここまでしか割振らない
    const paceCapMin = (parseFloat(tk.paceNorm) > 0 && tk.min > 0) ? parseFloat(tk.paceNorm) * tk.min : Infinity;
    while (remain > 5) {
      if ((workersCount[dm.id]||0) >= maxW) break;
      // できる人のうち、優先担当を最優先、次に残り時間が多い人に割り当て
      const ow = ownerIds(tk);
      const capable = att.filter(([id, m]) => m.skills && m.skills[dm.id] && cap[id] > 10)
                         .sort((a,b) => ((ow.includes(b[0])?1:0) - (ow.includes(a[0])?1:0)) || (cap[b[0]] - cap[a[0]]));
      if (!capable.length) break;
      const [mid] = capable[0];
      let alloc = Math.min(remain, cap[mid]);
      if (paceCapMin !== Infinity) alloc = Math.min(alloc, paceCapMin - (usedTaskMin[dm.id]||0));
      if (alloc <= 5) break;
      put(mid, dm.id, alloc, dm.note, dm.qi);
      workersCount[dm.id] = (workersCount[dm.id]||0) + 1;
      usedTaskMin[dm.id] = (usedTaskMin[dm.id]||0) + alloc;
      remain -= alloc;
    }
    // ペア作業：超仕上げ送りには受けを同じ時間つける
    if (dm.id === 'choshi_okuri' && tasks.choshi_uke) {
      const okuriMin = rows.filter(r => r.t==='choshi_okuri').reduce((s,r)=>s+r.min,0);
      const usedMids = rows.filter(r => r.t==='choshi_okuri').map(r=>r.m);
      let need = okuriMin - rows.filter(r=>r.t==='choshi_uke').reduce((s,r)=>s+r.min,0);
      if (need > 5) {
        const capable = att.filter(([id,m]) => m.skills && m.skills.choshi_uke && cap[id] > 10 && !usedMids.includes(id))
                           .sort((a,b) => cap[b[0]] - cap[a[0]]);
        if (capable.length) put(capable[0][0], 'choshi_uke', Math.min(need, cap[capable[0][0]]), dm.note, null);
      }
    }
  };
  mainD.forEach(assign);
  // ③ 空いた時間にストック作業を消化
  stockD.forEach(assign);
  // ※あえて残り時間は埋めない：バーの空きが「今日の余力」。ストックリストに作業を足せば埋まる
  plan.rows = rows;
  savePlan(false);
  renderToday();
  toast('割振りを自動作成しました（手で直せます）');
}

  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    db.ref('genba/plans/' + curDate()).set(plan);
    if (showToast) toast('保存しました');
  }, 400);
}

          <td><input type="checkbox" ${r.done?'checked':''} onchange="editRow(${i},'done',this.checked?1:0)"></td>
          <td><button class="btn-del" onclick="delRow(${i})">✕</button></td></tr>`;
      });
    });
    html += '</table>';
    // 負荷バー（出勤者を上に、休みの人は一番下に薄く）
    html += '<div style="margin-top:12px">';
    sortedMembers().filter(([mid]) => plan.att[mid]).forEach(([mid, m]) => {
      const capMin = capMinutes(m);
      const used = plan.rows.filter(r=>r.m===mid).reduce((s,r)=>s+(parseFloat(r.min)||0),0);
      const pct = Math.min(100, Math.round(used/capMin*100));
      html += `<div style="display:flex;align-items:center;gap:8px"><span style="width:70px;font-size:13px;font-weight:700">${esc(m.name)}</span>
        <div class="bar-wrap" style="flex:1"><div class="bar ${used>capMin?'over':''}" style="width:${pct}%"></div>
        <div class="bar-label">${fmtMin(used)} / ${fmtMin(capMin)}（${Math.round(used/capMin*100)}%）</div></div></div>`;
    });
    sortedMembers().filter(([mid]) => !plan.att[mid]).forEach(([mid, m]) => {
      const why = isAbsent(m) ? '🍼休業中' : isOffToday(m) ? '📅定休' : '休み';
      html += `<div style="display:flex;align-items:center;gap:8px;opacity:.4"><span style="width:70px;font-size:13px;font-weight:700">${esc(m.name)}</span>
        <div class="bar-wrap" style="flex:1"><div class="bar-label">${why}</div></div></div>`;
    });
    html += '</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}
function editRow(i, f, v) {
  plan.rows[i][f] = v;
  if (f==='t' || f==='min') {
    const tk = tasks[plan.rows[i].t] || {};
    plan.rows[i].qty = (tk.min>0 && tk.unit && tk.unit!=='分' && tk.unit!=='') ? Math.floor((parseFloat(plan.rows[i].min)||0)/tk.min) : '';
  }
  // 済にしたとき実績が空なら「予定どおり」で自動記入（あとで直せる）
  if (f==='done' && v) {
    const r = plan.rows[i];
    if ((r.qtyDone==null || r.qtyDone==='') && r.qty!=='' && r.qty!=null) r.qtyDone = r.qty;
    if (r.minDone==null || r.minDone==='') r.minDone = r.min;
    // 待ちリスト由来の作業なら、実績量ぶん残り量を自動で減らす（1回だけ）
    if (r.qi && !r.qDeducted && queueItems[r.qi]) {
      const usedQty = parseFloat(r.qtyDone)||0;
      const left = Math.max(0, (parseFloat(queueItems[r.qi].qty)||0) - usedQty);
      if (left > 0) db.ref('genba/queueItems/'+r.qi+'/qty').set(left);
      else db.ref('genba/queueItems/'+r.qi).remove();
      r.qDeducted = 1;
    }
  }
  savePlan(true); renderToday();
}

// ===== 商品・年間計画 =====
const sortedProducts = () => Object.entries(products).sort((a,b)=>(a[1].seq||99)-(b[1].seq||99));
function bufferPct() { const b = parseFloat((targets||{}).bufferPct); return isNaN(b) ? 15 : b; }
function totalYearTarget() {
  const s = sortedProducts().reduce((sum,[,p]) => sum + (parseFloat(p.yearTarget)||0), 0);
  return s > 0 ? s : (parseFloat((targets||{}).yearBundles)||0);
}
// 商品×作業の時間表から、作業ごとの年間必要分（バッファ込み）を計算
function requiredMinPerTask() {
  const req = {};
  sortedProducts().forEach(([, p]) => {
    const yt = parseFloat(p.yearTarget)||0;
    if (!yt) return;
    Object.entries(p.taskMin||{}).forEach(([tid, m]) => {
      if (!tasks[tid]) return;
      req[tid] = (req[tid]||0) + yt * (parseFloat(m)||0);
    });
  });
  const mult = 1 + bufferPct()/100;
  Object.keys(req).forEach(k => req[k] = req[k] * mult);
  return req;
}
function annualRequiredHours() {
  const req = requiredMinPerTask();
  return Math.round(Object.values(req).reduce((s,v)=>s+v,0) / 60);
}
function annualSupplyHours(includeAbsent) {
  const wD = parseFloat((targets||{}).workDays)||245;
  return Math.round(sortedMembers()
    .filter(([,m]) => includeAbsent || !isAbsent(m))
    .reduce((s,[,m]) => s + capMinutes(m)/60*wD, 0));
}
// 今年の商品別実績（加工予定表の完了データから）
function yearlyDoneByCode() {
  const yearStr = String(new Date().getFullYear());
  const done = {};
  kakouItems.forEach(it => {
    const ts = it.completed_at || it.archived_at;
    if (!ts) return;
    if (String(new Date(ts).getFullYear()) !== yearStr) return;
    const a = parseFloat(it.actual), p = parseFloat(it.planned);
    const b = !isNaN(a) ? a : (isNaN(p) ? 0 : p);
    const code = it.hinmei || '?';
    done[code] = (done[code]||0) + b;
  });
  return done;
}
function pEdit(id, f, v) { db.ref('genba/products/'+id+'/'+f).set(v); }

  db.ref('genba/products/'+id).set({ seq:maxSeq+1, code:'', name, yearTarget:0, taskMin:{}, note:'' });
}

// ===== ノルマ・進捗 =====
function monthDone(ym) {
  // 加工予定表の完了日時から当月の束数を集計 ＋ 手動補正
  let b = 0;
  kakouItems.forEach(it => {
    const ts = it.completed_at || it.archived_at;
    if (!ts) return;
    const d = new Date(ts);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    if (key !== ym) return;
    const a = parseFloat(it.actual), p = parseFloat(it.planned);
    b += !isNaN(a) ? a : (isNaN(p) ? 0 : p);
  });
  const adj = parseFloat((actuals[ym]||{}).adjust) || 0;
  return { auto: Math.round(b), adj, total: Math.round(b) + adj };
}

      <td contenteditable="true" onblur="tEdit('${id}','min',parseFloat(this.textContent)||0)">${t.min}</td>
      <td class="qty-big" style="color:${avg?'#2e7d32':'#bbb'}">${avg!=null?avg:'-'}</td>
      <td style="font-size:12px;color:#888">${st?st.n+'回':'-'}</td>
      <td>${avg!=null && avg!==t.min ? `<button class="btn sm blue" onclick="tEdit('${id}','min',${avg});toast('標準時間を実測値に更新しました')">反映</button>` : ''}</td>
      <td contenteditable="true" onblur="tEdit('${id}','paceNorm',parseFloat(this.textContent)||0)" style="${parseFloat(t.paceNorm)>0?'background:#fff3e0;font-weight:700':''}">${parseFloat(t.paceNorm)>0?t.paceNorm:''}</td>
      <td contenteditable="true" onblur="tEdit('${id}','owners',this.textContent.trim())" style="font-size:12px">${esc(t.owners||'')}</td>
      <td contenteditable="true" onblur="tEdit('${id}','dailyMin',parseFloat(this.textContent)||0)" style="${parseFloat(t.dailyMin)>0?'background:#e3f2fd;font-weight:700':''}">${parseFloat(t.dailyMin)>0?t.dailyMin:''}</td>
      <td><select onchange="tEdit('${id}','pri',parseInt(this.value))">${pOpts}</select></td>
      <td><select onchange="tEdit('${id}','type',this.value)">${tyOpts}</select></td>
      <td contenteditable="true" onblur="tEdit('${id}','maxW',parseInt(this.textContent)||1)">${t.maxW||1}</td>
      <td style="font-size:11px;color:#888">${t.source==='kakou_molder'?'加工予定表(モルダー)':t.source==='kakou_kessoku'?'加工予定表(結束)':t.source==='kakou_pate'?'モルダー連動(×2人×丸節率85%)':'手入力キュー'}</td>
      <td class="l" contenteditable="true" onblur="tEdit('${id}','note',this.textContent.trim())" style="font-size:12px;color:#666">${esc(t.note||'')}</td>
      <td><button class="btn-del" onclick="if(confirm('「${esc(t.name)}」を削除しますか？'))db.ref('genba/tasks/${id}').remove()">削除</button></td></tr>`;
  });
  html += '</table><div style="margin-top:10px"><button class="btn blue" onclick="openTaskModal()">＋ 作業を追加</button></div></div>';
  el.innerHTML = html;
}
function tEdit(id, f, v) { db.ref('genba/tasks/'+id+'/'+f).set(v); }

// ===== かんたん作業追加 =====
function openTaskModal() {
  const who = document.getElementById('ntWho');
  who.innerHTML = sortedMembers().map(([id, m]) =>
    `<label><input type="checkbox" value="${id}" checked>${esc(m.name)}</label>`).join('');
  document.getElementById('ntName').value = '';
  document.getElementById('taskModal').classList.add('show');
  document.getElementById('ntName').focus();
}
function closeTaskModal() { document.getElementById('taskModal').classList.remove('show'); }
function saveNewTask() {
  const name = document.getElementById('ntName').value.trim();
  if (!name) { toast('作業名を入れてください'); return; }
  const id = 't' + Date.now();
  const maxSeq = Math.max(0, ...Object.values(tasks).map(t=>t.seq||0));
  const ups = {};
  ups['tasks/'+id] = {
    seq: maxSeq+1, name,
    unit: document.getElementById('ntUnit').value.trim(),
    min: parseFloat(document.getElementById('ntMin').value)||0,
    pri: parseInt(document.getElementById('ntPri').value)||3,
    type: document.getElementById('ntType').value, maxW: 2, source:'', note:''
  };
  document.querySelectorAll('#ntWho input:checked').forEach(cb => { ups['members/'+cb.value+'/skills/'+id] = 1; });
  db.ref('genba').update(ups);
  closeTaskModal();
  toast('「'+name+'」を登録しました');
}

// ===== 実績集計（済にした行の実績量・実時間から） =====
let statsCache = null;
function loadStats(cb) {
  db.ref('genba/plans').once('value', s => {
    const all = s.val()||{};
    const agg = {};
    Object.entries(all).forEach(([date, p]) => {
      (p.rows||[]).forEach(r => {
        if (!r.done) return;
        const mn = parseFloat(r.minDone), q = parseFloat(r.qtyDone);
        if (isNaN(mn) || mn <= 0) return;
        const a = agg[r.t] = agg[r.t] || { qty:0, min:0, n:0, byMonth:{}, byDate:{} };
        a.min += mn; a.n++;
        if (!isNaN(q) && q > 0) { a.qty += q; a.byDate[date] = (a.byDate[date]||0) + q; }
        const ymKey = String(date).slice(0,7);
        const bm = a.byMonth[ymKey] = a.byMonth[ymKey] || { qty:0, min:0 };
        bm.min += mn;
        if (!isNaN(q) && q > 0) bm.qty += q;
      });
    });
    statsCache = agg;
    cb(agg);
  });
}

// ===== メンバー =====
function renderMembers() {
  const el = document.getElementById('page-members');
  let html = '<div class="sec"><h2>メンバー</h2>';
  html += '<table style="max-width:1350px"><tr><th>順</th><th>名前</th><th>年齢</th><th>引退予定年齢</th><th>出勤</th><th>退勤</th><th>実働</th><th>能率(%)</th><th>定休日</th><th>固定枠(分/日)</th><th>固定枠の作業</th><th>休業中(〜日付)</th><th>メモ</th><th></th></tr>';
  sortedMembers().forEach(([id, m]) => {
    const rOpts = '<option value="">-</option>' + sortedTasks().map(([tid, t]) =>
      `<option value="${tid}" ${m.reserveTask===tid?'selected':''}>${esc(t.name)}</option>`).join('');
    html += `<tr${isAbsent(m)?' style="opacity:.5;background:#fdf6ef"':''}>
      <td contenteditable="true" onblur="mEdit('${id}','seq',parseFloat(this.textContent)||99)">${m.seq||''}</td>
      <td class="l member-name" contenteditable="true" onblur="mEdit('${id}','name',this.textContent.trim())">${esc(m.name)}</td>
      <td contenteditable="true" onblur="mEdit('${id}','age',parseFloat(this.textContent)||'')">${m.age||''}</td>
      <td contenteditable="true" onblur="mEdit('${id}','retireAge',parseFloat(this.textContent)||'')">${m.retireAge||''}</td>
      <td><input type="time" value="${esc(m.workStart||'')}" onchange="mEdit('${id}','workStart',this.value)"></td>
      <td><input type="time" value="${esc(m.workEnd||'')}" onchange="mEdit('${id}','workEnd',this.value)"></td>
      <td style="font-weight:700">${fmtMin(workMinutes(m))}</td>
      <td contenteditable="true" onblur="mEdit('${id}','eff',parseFloat(this.textContent)||100)">${m.eff||100}</td>
      <td contenteditable="true" onblur="mEdit('${id}','offDays',this.textContent.trim())" style="${m.offDays?'background:#fff3e0;font-weight:700':''}">${esc(m.offDays||'')}</td>
      <td contenteditable="true" onblur="mEdit('${id}','reserveMin',parseFloat(this.textContent)||0)">${m.reserveMin||''}</td>
      <td><select onchange="mEdit('${id}','reserveTask',this.value)">${rOpts}</select></td>
      <td contenteditable="true" onblur="mEdit('${id}','absentUntil',this.textContent.trim())" style="font-size:12px;${isAbsent(m)?'background:#fff3e0;font-weight:700':''}">${esc(m.absentUntil||'')}</td>
      <td class="l" contenteditable="true" onblur="mEdit('${id}','note',this.textContent.trim())" style="font-size:12px;color:#666">${esc(m.note||'')}</td>
      <td><button class="btn-del" onclick="if(confirm('「${esc(m.name)}」を削除しますか？'))db.ref('genba/members/${id}').remove()">削除</button></td></tr>`;
  });
  // 合計行（休業中は現戦力から除外、復帰後も併記）
  const actMin = sortedMembers().filter(([,m])=>!isAbsent(m)).reduce((s,[,m])=>s+capMinutes(m),0);
  const allMin = sortedMembers().reduce((s,[,m])=>s+capMinutes(m),0);
  const absentNames = sortedMembers().filter(([,m])=>isAbsent(m)).map(([,m])=>m.name).join('・');
  html += `<tr style="background:#e8f5e9;font-weight:800">
    <td colspan="6" class="l">合計（今使える戦力／1日）${absentNames?`<span style="font-weight:400;font-size:11px;color:#888">　休業中: ${esc(absentNames)} は除外</span>`:''}</td>
    <td>${fmtMin(actMin)}</td><td colspan="7" class="l" style="font-weight:400;color:#666">${allMin>actMin?`復帰後(全員): <b>${fmtMin(allMin)}</b>（+${fmtMin(allMin-actMin)}）`:''}</td></tr>`;
  html += '</table><div style="margin-top:10px"><button class="btn blue" onclick="addMember()">＋ メンバーを追加</button></div>';
  html += '<div class="hint" style="margin-top:8px">実働＝出勤〜退勤から勤務時間内の休憩（10:00に15分・12:00に45分・15:00に15分）を自動で差し引いた時間。能率(%)：標準を100として、慣れてきたら110、体力的にゆっくりなら80のように（成長を織り込む欄）。<b>固定枠</b>：毎日必ず確保する時間（大樹のAI・業務改善など）。<b>定休日</b>：「月木」のように曜日を入れると、その曜日は出勤の初期値から外れます（チップを押せばその日だけ出勤にできます）。<b>休業中</b>：日付（例 2026-11-30）を入れると、その日まで出勤の初期値から外れます。年齢・引退予定は将来シミュレーションに使います。</div></div>';

  // スキルマトリクス
  html += '<div class="sec"><h2>できる作業（スキル表）</h2><div class="hint">チェックした作業だけ割振り対象になります。</div><div class="skills-scroll"><table><tr><th style="min-width:90px">名前＼作業</th>';
  sortedTasks().forEach(([, t]) => { html += `<th class="rot"><div>${esc(t.name)}</div></th>`; });
  html += '</tr>';
  sortedMembers().forEach(([mid, m]) => {
    html += `<tr><td class="l member-name">${esc(m.name)}</td>`;
    sortedTasks().forEach(([tid]) => {
      const on = m.skills && m.skills[tid];
      html += `<td><input type="checkbox" ${on?'checked':''} onchange="db.ref('genba/members/${mid}/skills/${tid}').${'set'}(this.checked?1:null)"></td>`;
    });
    html += '</tr>';
  });
  html += '</table></div></div>';
  el.innerHTML = html;
}
function mEdit(id, f, v) { db.ref('genba/members/'+id+'/'+f).set(v); }
function addMember() {
  const name = prompt('名前を入力'); if (!name) return;
  const id = 'm' + Date.now();
  const maxSeq = Math.max(0, ...Object.values(members).map(m=>m.seq||0));
  db.ref('genba/members/'+id).set({ seq:maxSeq+1, name, age:'', retireAge:70, hours:8, eff:100, skills:{sonota:1}, note:'' });
}

// ===== 将来シミュレーション =====
function renderFuture() {
  const el = document.getElementById('page-future');
  const t = targets || {};
  const wD = parseFloat(t.workDays)||245;
  const thisYear = new Date().getFullYear();
  // 現在の年間供給時間
  const supplyAt = (yOffset) => {
    let h = 0; const gone = [];
    sortedMembers().forEach(([, m]) => {
      const age = parseFloat(m.age);
      const ra = parseFloat(m.retireAge);
      if (!isNaN(age) && !isNaN(ra) && age + yOffset >= ra) { gone.push(m.name + '(' + (age+yOffset) + '歳)'); return; }
      h += capMinutes(m) / 60 * wD;
    });
    return { h: Math.round(h), gone };
  };
  const base = supplyAt(0).h;
  const autoReq = annualRequiredHours();
  const reqH = parseFloat(t.yearHours) || (autoReq > 0 ? autoReq : base);

  let html = '<div class="sec"><h2>人員の将来シミュレーション</h2><div class="hint">年齢と引退予定年齢（メンバー画面で入力）から、この先10年の労働力を試算します。年齢が未入力の人は常に在籍として計算します。</div>';
  html += `<div style="margin-bottom:10px">年間に必要な工数（時間）: <input type="number" style="width:120px" value="${parseFloat(t.yearHours)||''}" placeholder="${autoReq>0?autoReq:base}" onchange="db.ref('genba/targets/yearHours').set(parseFloat(this.value)||'')"> <span class="hint" style="display:inline">${autoReq>0 ? '空欄なら商品・年間計画から自動計算（バッファ込み '+autoReq.toLocaleString()+'時間/年）' : '空欄なら現在の総力（'+base.toLocaleString()+'時間/年）を基準にします'}</span></div>`;
  html += '<table style="max-width:900px"><tr><th>年</th><th>労働力（時間/年）</th><th>必要量に対して</th><th>その年までに引退</th></tr>';
  for (let y=0; y<=10; y++) {
    const s = supplyAt(y);
    const pct = Math.round(s.h/reqH*100);
    const shortCls = s.h < reqH ? ' class="short"' : '';
    html += `<tr${shortCls}><td>${thisYear+y}年${y===0?'（今）':''}</td><td class="qty-big">${s.h.toLocaleString()}</td><td>${pct}%${s.h<reqH?' ⚠不足':''}</td><td class="l" style="font-size:12px">${esc(s.gone.join('、'))||'-'}</td></tr>`;
  }
  html += '</table>';
  html += '<div class="hint" style="margin-top:10px">⚠が出る年が「今のやり方が回らなくなる年」。採用・機械化・外注化の判断材料に。若手の能率(%)を上げて成長を織り込むこともできます。</div></div>';
  el.innerHTML = html;
}

// ===== 画面切替 =====
function showPage(p) {
  curPage = p;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.page===p));
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  renderAll();
}
function renderAll() {
  if (!ready.g) return;
  if (curPage==='today') renderToday();
  else if (curPage==='products') renderProducts();
  else if (curPage==='norma') renderNorma();
  else if (curPage==='tasks') renderTasks();
  else if (curPage==='members') renderMembers();
  else if (curPage==='future') renderFuture();
}
document.getElementById('planDate').value = today();
